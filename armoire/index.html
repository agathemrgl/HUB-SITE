<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Armoire - Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page-shell">

    <!-- Contrôles haut droite : zoom + refresh -->
    <div class="top-actions">
      <button class="top-btn" id="zoom-out-button" title="Zoom arrière">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>
      <span class="top-zoom-level" id="zoom-level">70%</span>
      <button class="top-btn" id="zoom-in-button" title="Zoom avant">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </button>
      <div class="top-sep"></div>
      <button class="top-btn" id="reset-button" title="Rafraîchir la page">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
        </svg>
      </button>
    </div>

    <!-- Toolbar flottante centrée -->
    <div class="toolbar">

      <!-- Outil déplacer -->
      <button class="toolbar-btn is-active" id="tool-pan" title="Déplacer">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 11V6a2 2 0 0 0-4 0v0"/><path d="M14 10V4a2 2 0 0 0-4 0v2"/><path d="M10 10.5V6a2 2 0 0 0-4 0v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
        </svg>
      </button>

      <div class="toolbar-sep"></div>

      <!-- Ajouter image -->
      <label class="toolbar-btn" title="Ajouter une image">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
        </svg>
        <input id="file-input" type="file" accept="image/*" multiple />
      </label>
      <select id="upload-category" class="toolbar-select" title="Catégorie">
        <option value="tops">Hauts</option>
        <option value="bottoms">Bas</option>
        <option value="shoes">Chaussures</option>
        <option value="accessories">Accessoires</option>
      </select>

      <div class="toolbar-sep"></div>

      <!-- Enregistrer -->
      <button class="toolbar-btn" id="save-button" title="Enregistrer (⌘S)">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
          <polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/>
        </svg>
      </button>

    </div>

    <div class="board-viewport">
      <div class="board" id="workspace" aria-label="Plateau de travail">
        <div class="bg-welcome">
          <span class="bg-welcome-title">Bienvenue</span>
          <p class="bg-welcome-intro">Trouve ton meilleur outfit <3 </p>
        </div>

        <div class="canvas-arrow">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/>
          </svg>
        </div>

        <div class="wardrobe">

          <!-- Bloc Outfit -->
          <div class="wardrobe-left">
            <div class="w-block w-block--outfit">
              <div class="w-block-header">Outfit</div>
            </div>
          </div>

          <!-- Blocs catégories -->
          <div class="wardrobe-right">
            <div class="w-block">
              <div class="w-block-header">Hauts</div>
              <div class="wardrobe-items" id="tops-list"></div>
            </div>
            <div class="w-block">
              <div class="w-block-header">Bas</div>
              <div class="wardrobe-items" id="bottoms-list"></div>
            </div>
            <div class="wardrobe-right-bottom">
              <div class="w-block w-block--small">
                <div class="w-block-header">Chaussures</div>
                <div class="wardrobe-items" id="shoes-list"></div>
              </div>
              <div class="w-block w-block--small">
                <div class="w-block-header">Accessoires</div>
                <div class="wardrobe-items" id="accessories-list"></div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
