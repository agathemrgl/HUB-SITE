      margin: 0;
      padding: 16px;
      background-image: url('Img/Fond.jpg');
      background-repeat: repeat;
      background-size: auto;
    }

    .title-bar {
      background: rgba(19, 0, 160, 0.5);
      color: white;
      font-family: Arial, sans-serif;
      font-size: 12px;
      font-weight: bold;
      padding: 6px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .title-bar-dot {
      width: 6px;
      height: 6px;
      background: #2bd40e;
      border: 1px outset #3029ff;
      display: inline-block;
    }

    .window {
      border: 2px inset #808080;
      max-width: 500px;
      margin: 20px 20px;
    }

    .window-body {
      background: rgba(255, 204, 245, 0.7);
      padding: 20px 50px;
    }

    h1 {
      font-family: Arial, sans-serif;
      font-size: 20px;
      font-weight: bold;
      color: #000080;
      text-align: center;
      border-bottom: 2px solid #000080;
      padding-bottom: 8px;
      margin: 0 0 6px;
    }

    .subtitle {
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: #555;
      text-align: center;
      margin: 0 0 20px;
    }

    ul {
      margin: 0;
      padding-left: 50px;
    }

    li {
      font-size: 14px;
      margin: 5px 0;
      line-height: 1.5;
    }

    a {
      color: #0000EE;
      text-decoration: underline;
    }

    a:visited {
      color: #551A8B;
    }

    a:active {
      color: #FF0000;
    }

    .note {
      font-style: italic;
      color: #c8ff23;
      font-size: 12px;
    }

    .counter {
      font-family: "Courier New", monospace;
      font-size: 11px;
      color: #555;
      text-align: center;
      border-top: 1px dashed #aaa;
      padding-top: 10px;
      margin-top: 20px;
    }

    .status-bar {
      background: rgba(196, 196, 196, 0.8);
      border-top: 2px inset #808080;
      font-family: Arial, sans-serif;
      font-size: 9px;
      padding: 2px 8px;
    }
  </style>
</head>
